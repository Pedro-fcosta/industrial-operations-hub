{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Cadastrar Posição</h2>

    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="cr">CR</label>
                <input type="text" name="cr" id="cr" required>
            </div>

            <div class="form-group">
                <label for="posicao">Posição</label>
                <input type="text" name="posicao" id="posicao" required>
            </div>

            <div class="form-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" name="quantidade" id="quantidade" required>
            </div>

            <div class="form-group">
                <label for="local_atual">Local Inicial</label>
                <select name="local_atual" id="local_atual" required>
                    {% for setor in setores %}
                        <option value="{{ setor }}">{{ setor }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group full" id="campo-outro-inicial" style="display: none;">
                <label for="outro_local_inicial">Especifique o local inicial</label>
                <input type="text" name="outro_local_inicial" id="outro_local_inicial" placeholder="Digite o local inicial">
            </div>

            <div class="form-group">
                <label for="responsavel">Responsável</label>
                <input type="text" name="responsavel" id="responsavel" required>
            </div>

            <div class="form-group full">
                <label for="observacao">Observação</label>
                <textarea name="observacao" id="observacao"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit">Salvar</button>
        </div>
    </form>
</div>

<script>
    const localAtual = document.getElementById("local_atual");
    const campoOutroInicial = document.getElementById("campo-outro-inicial");
    const outroLocalInicial = document.getElementById("outro_local_inicial");

    localAtual.addEventListener("change", function () {
        if (localAtual.value === "Outro") {
            campoOutroInicial.style.display = "flex";
            outroLocalInicial.required = true;
        } else {
            campoOutroInicial.style.display = "none";
            outroLocalInicial.required = false;
            outroLocalInicial.value = "";
        }
    });
</script>
{% endblock %}
